  # ── 综合技术 ──────────────────────────────────────────────
  - name: "Hacker News Best (AI)"
    url: "https://hnrss.org/best?q=AI+OR+LLM+OR+GPT+OR+agent"
    category: "综合技术"
    enabled: false  # 量大，按需开启

  - name: "Lobsters AI/ML"
    url: "https://lobste.rs/t/ai,ml.rss"
    category: "综合技术"
    enabled: true

  # ── AI 研究 ──────────────────────────────────────────────
  - name: "arXiv cs.AI"
    url: "https://rss.arxiv.org/rss/cs.AI"
    category: "AI 研究"
    enabled: false  # 量大，按需开启

  # ── 公司博客 ──────────────────────────────────────────────
  - name: "OpenAI Blog"
    url: "https://openai.com/blog/rss.xml"
    category: "公司博客"
    enabled: true

  - name: "Anthropic Research"
    url: "https://www.anthropic.com/rss.xml"
    category: "公司博客"
    enabled: true

  - name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    category: "公司博客"
    enabled: true

  # ── 中文社区 ──────────────────────────────────────────────
  - name: "机器之心"
    url: "https://www.jiqizhixin.com/rss"
    category: "中文社区"
    enabled: false  # 需确认 RSS 可用性

  - name: "量子位"
    url: "https://www.qbitai.com/feed"
    category: "中文社区"
    enabled: false  # 需确认 RSS 可用性

  # ── Reddit ──────────────────────────────────────────────
  - name: "Reddit r/MachineLearning"
    url: "https://www.reddit.com/r/MachineLearning/hot.rss"
    category: "research"
    enabled: true

  - name: "Reddit r/LocalLLaMA"
    url: "https://www.reddit.com/r/LocalLLaMA/hot.rss"
    category: "open-source"
    enabled: true

  # ── 行业与新闻 ──────────────────────────────────────────
  - name: "Google AI Blog"
    url: "https://blog.google/technology/ai/rss/"
    category: "industry"
    enabled: true

  - name: "The Verge (AI)"
    url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
    category: "news"
    enabled: true
