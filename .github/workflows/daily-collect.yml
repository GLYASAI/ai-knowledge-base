name: Daily Collect

on:
  schedule:
    - cron: "0 2 * * *" # UTC 02:00, 即北京时间10:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: sudo apt-get install -y fonts-noto-cjk

      - run: pip install -r requirements.txt

      - name: Run workflow
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python -m workflows.graph

      - name: Validate articles
        run: |
          shopt -s nullglob
          files=()
          for f in knowledge/articles/*.json; do
            [[ "$(basename "$f")" == "index.json" ]] && continue
            files+=("$f")
          done
          if [ ${#files[@]} -gt 0 ]; then
            python hooks/validate_json.py "${files[@]}"
            python hooks/check_quality.py "${files[@]}"
          fi

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/ drafts/
          if git diff --cached --quiet; then
            echo "No new data, skip commit."
          else
            count=$(git diff --cached --name-only -- 'knowledge/articles/*.json' | wc -l | tr -d ' ')
            date=$(date -u +%Y-%m-%d)
            git commit -m "chore: daily collect ${date} — ${count} articles"
            git push
          fi

      - name: Publish
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          python - <<'EOF'
          import asyncio
          from distribution.publisher import publish_daily_digest

          async def main():
              results = await publish_daily_digest(knowledge_dir="knowledge/articles")
              for r in results:
                  status = "✅" if r.success else "❌"
                  print(f"{status} {r.channel}: {r.error or 'ok'}")
              if any(not r.success for r in results):
                  raise SystemExit(1)

          asyncio.run(main())
          EOF
